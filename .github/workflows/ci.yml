name: CI

on:
  push:
  workflow_dispatch:

jobs:
  ci:
    timeout-minutes: 12
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Typecheck
        run: pnpm typecheck
      - name: Start pg
        run: docker compose -f docker-compose.yml up -d
      - name: Run indexer
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/default
          ENABLED_CHAINS: base
          MAINNET_RPC: https://eth-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_API_KEY }}
          BASE_RPC: https://base-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_API_KEY }}
          PONDER_RPC_URL_1: https://eth-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_API_KEY }}
          PONDER_RPC_URL_11155111: https://ethereum-sepolia-rpc.publicnode.com
          PONDER_RPC_URL_8453: https://base-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_API_KEY }}
          PONDER_RPC_URL_84532: https://sepolia.base.org
          PONDER_RPC_URL_143: https://rpc.monad.xyz
          PONDER_RPC_URL_57073: https://rpc-gel.inkonchain.com
          PONDER_RPC_URL_130: https://mainnet.unichain.org
        run: pnpm dev --disable-ui &

      - name: Wait for healthy status
        run: pnpx wait-on http://localhost:42069/health

      - name: Can codegen
        run: pnpm codegen
